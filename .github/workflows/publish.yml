name: CLI, npm, and Homebrew Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      npm_publish_dry_run:
        description: "Build all CLI artifacts and run npm publish with --dry-run"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  test-cli:
    name: Test CLI packaging
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Rust tests
        run: cargo test

      - name: Verify packaging metadata
        run: npm run test:cli-packaging

  build-cli:
    name: Build ${{ matrix.target }}
    needs: test-cli
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          echo "INVOICEGEN_VERSION=$version" >> "$GITHUB_ENV"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI archive
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: node script/build_cli_release.mjs

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            dist/cli/${{ matrix.target }}
            dist/cli/invoicegen-rs-*-${{ matrix.target }}.tar.gz
            dist/cli/invoicegen-rs-*-${{ matrix.target }}.tar.gz.sha256

  publish-github-assets:
    name: Upload CLI release assets
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/cli

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "InvoiceGen ${GITHUB_REF_NAME#v}" --notes "InvoiceGen CLI release ${GITHUB_REF_NAME#v}."
          fi
          gh release upload "$GITHUB_REF_NAME" dist/cli/*.tar.gz dist/cli/*.sha256 --clobber

  publish-npm:
    name: Publish npm packages
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist/cli

      - name: Derive release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "INVOICEGEN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
            echo "INVOICEGEN_VERSION=$version" >> "$GITHUB_ENV"
          fi

      - name: Stage npm packages
        run: npm run stage:npm-cli

      - name: Publish npm packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
          NPM_PUBLISH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_publish_dry_run && '1' || '0' }}
        shell: bash
        run: node script/publish_npm_packages.mjs

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_TAP_REPOSITORY: megabyte0x/homebrew-tap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version and source checksum
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          source_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/v${version}.tar.gz"
          curl -sL "$source_url" -o /tmp/invoicegen-source.tar.gz
          echo "INVOICEGEN_VERSION=$version" >> "$GITHUB_ENV"
          echo "INVOICEGEN_SOURCE_SHA256=$(sha256sum /tmp/invoicegen-source.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Render formula
        run: npm run render:homebrew-cli

      - name: Check out Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Commit formula update
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          mkdir -p homebrew-tap/Formula
          cp dist/homebrew/invoicegen.rb homebrew-tap/Formula/invoicegen.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/invoicegen.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already current."
          else
            git commit -m "Update invoicegen to ${INVOICEGEN_VERSION}"
            git push
          fi

      - name: Explain skipped Homebrew tap update
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: echo "Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured."
